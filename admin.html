<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - StudentShathi</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        input, button { padding: 12px; border-radius: 8px; border: none; margin: 10px 0; }
        input { width: 100%; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; }
        .btn { background: #00f2fe; color: #000; font-weight: bold; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: left; }
        th { background: #00f2fe; color: black; }
    </style>
</head>
<body>

    <div id="auth" style="text-align: center; margin-top: 100px;">
        <h2>Admin Security</h2>
        <input type="password" id="p" placeholder="Enter Password" style="width:250px;">
        <button onclick="login()" class="btn" style="width:250px;">LOGIN</button>
    </div>

    <div id="main" style="display:none;" class="box">
        <h2>📢 Send Notification</h2>
        <input type="text" id="msg" placeholder="Write message to all students...">
        <button onclick="sendNotif()" class="btn">SEND NOW</button>

        <hr style="margin: 30px 0; border: 0.5px solid #334155;">

        <h2>👥 Registered Students</h2>
        <table>
            <thead><tr><th>Name</th><th>Class</th><th>Mobile</th></tr></thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1yFLm45RSy45QVengZ7wMIP6I_aEv4Ro",
            authDomain: "studentshathi-af31d.firebaseapp.com",
            projectId: "studentshathi-af31d",
            storageBucket: "studentshathi-af31d.firebasestorage.app",
            messagingSenderId: "950398226657",
            appId: "1:950398226657:web:29d7ad272c82bdf385e7a0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = function() {
            if(document.getElementById('p').value === "PRINCE786") {
                document.getElementById('auth').style.display='none';
                document.getElementById('main').style.display='block';
                loadUsers();
            }
        }

        window.sendNotif = async function() {
            let t = document.getElementById('msg').value;
            await setDoc(doc(db, "settings", "notification"), { text: t });
            alert("Sent!");
        }

        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            let html = "";
            snap.forEach(d => {
                html += `<tr><td>${d.data().fullName}</td><td>${d.data().studentClass}</td><td>${d.data().mobile}</td></tr>`;
            });
            document.getElementById('list').innerHTML = html;
        }
    </script>
</body>
</html>
