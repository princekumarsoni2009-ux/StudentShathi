<div id="admin" class="page">
    <h2 style="color:var(--gold);">👑 Admin Dashboard</h2>
    
    <div class="card" style="border: 1px dashed var(--neon);">
        <h4>Add Test Question</h4>
        <input type="text" id="t-ques" placeholder="Sawal likho (e.g. 5+5?)">
        <input type="text" id="t-opt1" placeholder="Option A">
        <input type="text" id="t-opt2" placeholder="Option B">
        <input type="text" id="t-correct" placeholder="Sahi Option (A ya B)">
        <button class="btn" style="background:var(--neon); color:black;" onclick="uploadTest()">PUBLISH TEST QUESTION</button>
    </div>

    <div class="card">
        <h4>Add New Paper (PDF)</h4>
        <input type="text" id="paper-title" placeholder="Paper Name">
        <input type="text" id="paper-url" placeholder="PDF Link">
        <button class="btn" onclick="addPaper()">UPLOAD PAPER</button>
    </div>
</div>

<div id="test-page" class="page">
    <div class="card" id="test-area">
        <h3 id="test-status">Test Loading...</h3>
        <div id="quiz-box" style="display:none;">
            <h4 id="display-q">---</h4>
            <button class="btn" id="optA" style="margin-bottom:10px; background:#334155;"></button>
            <button class="btn" id="optB" style="background:#334155;"></button>
        </div>
    </div>
    
    <div id="result-box" class="card" style="display:none; text-align:center; border:2px solid var(--gold);">
        <h2 style="color:var(--gold);">Test Result 🏆</h2>
        <h1 id="user-score" style="font-size:50px;">0</h1>
        <p>Aapka performance record ho gaya hai.</p>
        <button class="btn" onclick="location.reload()">BACK TO HOME</button>
    </div>
</div>

<script type="module">
    // ... (Pura purana Firebase Setup same rahega) ...

    // --- ADMIN: Upload Test Question ---
    window.uploadTest = async () => {
        const q = document.getElementById('t-ques').value;
        const a = document.getElementById('t-opt1').value;
        const b = document.getElementById('t-opt2').value;
        const cor = document.getElementById('t-correct').value;

        if(!q || !a || !b) return alert("Sawal aur options bharo!");

        await setDoc(doc(db, "live_test", "current"), {
            question: q, optA: a, optB: b, correct: cor, active: true
        });
        alert("Live Test Update Ho Gaya!");
    }

    // --- USER: Start & Show Test ---
    let correctAnswer = "";
    onSnapshot(doc(db, "live_test", "current"), (doc) => {
        if(doc.exists() && doc.data().active) {
            const data = doc.data();
            document.getElementById('test-status').innerText = "🔴 LIVE MEGA TEST";
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('display-q').innerText = data.question;
            document.getElementById('optA').innerText = "A) " + data.optA;
            document.getElementById('optB').innerText = "B) " + data.optB;
            correctAnswer = data.correct;
        }
    });

    document.getElementById('optA').onclick = () => checkResult("A");
    document.getElementById('optB').onclick = () => checkResult("B");

    function checkResult(userChoice) {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        if(userChoice === correctAnswer) {
            document.getElementById('user-score').innerText = "1 / 1";
            document.getElementById('user-score').style.color = "#10b981";
        } else {
            document.getElementById('user-score').innerText = "0 / 1";
            document.getElementById('user-score').style.color = "#f43f5e";
        }
    }
</script>
