<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - StudentShathi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .box { max-width: 800px; margin: 20px auto; background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00f2fe; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { background: #00f2fe; color: #000; font-weight: bold; cursor: pointer; width: 100%; border: none; padding: 15px; border-radius: 10px; margin-top: 5px; }
        .btn:hover { background: #05d5e0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: left; }
        th { background: #00f2fe; color: black; }
    </style>
</head>
<body>

    <div id="auth" style="text-align: center; margin-top: 100px;">
        <div class="box" style="max-width:350px;">
            <h2>Admin Login</h2>
            <input type="password" id="p" placeholder="Enter Secret Password">
            <button onclick="login()" class="btn">UNLOCK PANEL</button>
        </div>
    </div>

    <div id="main" style="display:none;">
        <div class="box">
            <h2>📢 Update Notification</h2>
            <input type="text" id="msg" placeholder="E.g. Kal 10 baje Science ka test hai!">
            <button onclick="sendUpdate('notification', {text: document.getElementById('msg').value})" class="btn">Update Notice</button>
        </div>

        <div class="box">
            <h2>📚 Upload Resources (Links)</h2>
            <div class="grid">
                <div>
                    <label>PDF Notes Link</label>
                    <input type="text" id="pdfLink" placeholder="Paste Google Drive Link">
                </div>
                <div>
                    <label>Live Test Link</label>
                    <input type="text" id="testLink" placeholder="Paste Quiz/Form Link">
                </div>
            </div>
            <button onclick="updateResources()" class="btn" style="background: #a855f7; color:white;">Update PDF & Test</button>
        </div>

        <div class="box">
            <h2>👥 Registered Students</h2>
            <table>
                <thead><tr><th>Name</th><th>Class</th><th>Mobile</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1yFLm45RSy45QVengZ7wMIP6I_aEv4Ro",
            authDomain: "studentshathi-af31d.firebaseapp.com",
            projectId: "studentshathi-af31d",
            storageBucket: "studentshathi-af31d.firebasestorage.app",
            messagingSenderId: "950398226657",
            appId: "1:950398226657:web:29d7ad272c82bdf385e7a0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = function() {
            if(document.getElementById('p').value === "PRINCE786") {
                document.getElementById('auth').style.display='none';
                document.getElementById('main').style.display='block';
                loadUsers();
            } else { alert("Wrong Password!"); }
        }

        window.sendUpdate = async function(collectionName, data) {
            await setDoc(doc(db, "settings", collectionName), data);
            alert("Updated Successfully!");
        }

        window.updateResources = async function() {
            const pdf = document.getElementById('pdfLink').value;
            const test = document.getElementById('testLink').value;
            await setDoc(doc(db, "settings", "links"), { pdfUrl: pdf, testUrl: test });
            alert("PDF and Test Links Updated!");
        }

        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            let html = "";
            snap.forEach(d => {
                html += `<tr><td>${d.data().fullName}</td><td>${d.data().studentClass}</td><td>${d.data().mobile}</td></tr>`;
            });
            document.getElementById('list').innerHTML = html;
        }
    </script>
</body>
</html>
